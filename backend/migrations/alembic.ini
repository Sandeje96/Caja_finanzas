# A generic, single database configuration — managed by Flask-Migrate

[alembic]
# path to migration scripts (relative to this file's location)
script_location = migrations

# template for migration file names
file_template = %%(rev)s_%%(slug)s

# sys.path path prepended for imports
prepend_sys_path = .

version_path_separator = os

# sqlalchemy.url is overridden by env.py using Flask app config
sqlalchemy.url = driver://user:pass@localhost/dbname

[post_write_hooks]
# No post-write hooks configured

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
